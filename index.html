<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ef;
      --surface:  #ffffff;
      --surface2: #f0ede8;
      --border:   #000000;
      --border2:  #000000;
      --text:     #000000;
      --muted:    #000000;
      --gold:     #8a6820;
      --gold2:    #a07828;
      --radius:   6px;

      --c1: #8a6820;
      --c2: #c04040;
      --c3: #2a8a72;
      --c4: #2a5ca8;
      --c5: #7040a8;
      --c6: #a85020;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ─── HEADER ─── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 16px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 24px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.01em;
      min-width: 260px;
      text-align: center;
    }

    .month-label span {
      color: var(--gold);
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--gold); }

    .today-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .today-btn:hover { border-color: var(--gold); color: var(--gold); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      border-radius: var(--radius);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
    .icon-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .icon-btn-danger:hover { border-color: #c0392b !important; color: #c0392b !important; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: var(--bg);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { background: #c04040; color: #fff; }

    /* ─── CALENDAR ─── */
    .cal-wrap { padding: 0 16px; }

    .day-headers {
      display: grid;
      grid-template-columns: 32px repeat(7, 1fr);
      gap: 2px;
      margin-top: 24px;
      margin-bottom: 2px;
    }

    .day-header {
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--muted);
      padding: 8px 0;
      text-transform: uppercase;
    }

    .day-header.weekend { }

    .week-num-header {
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: 32px repeat(7, 1fr);
      gap: 2px;
    }

    .week-num-cell {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 8px;
      font-size: 9px;
      color: var(--muted);
      opacity: 0.5;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: transparent;
      border: none;
      user-select: none;
    }

    .day-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      min-height: 100px;
      padding: 8px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }

    .day-cell:hover { background: var(--surface2); border-color: var(--border2); }

    .day-cell.other-month {
      background: #eeece8;
      opacity: 0.6;
    }

    .day-cell.today {
      border-color: var(--gold);
      background: #fdf8ee;
    }

    .day-cell.today .day-num { color: var(--gold2); }
    .day-num.holiday { color: #c0392b !important; font-weight: 700; }

    .day-num {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-align: right;
      margin-bottom: 6px;
    }

    .day-events { display: flex; flex-direction: column; gap: 3px; }

    .event-pill {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      padding: 4px 7px;
      border-radius: 3px;
      line-height: 1.4;
      cursor: pointer;
      transition: filter 0.12s;
      word-break: break-word;
    }

    .event-pill:hover { filter: brightness(0.92); }

    .overflow-pill {
      font-size: 9px;
      color: var(--muted);
      padding: 2px 7px;
      letter-spacing: 0.05em;
    }

    .add-hint {
      font-size: 13px;
      color: var(--border2);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      text-align: right;
      padding: 2px 0 0;
    }

    .day-cell:hover .add-hint { opacity: 1; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      width: 420px;
      max-width: 95vw;
      padding: 28px;
      transform: translateY(10px);
      transition: transform 0.2s;
      position: relative;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-date {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-date span { color: var(--gold); }

    .modal-subtitle {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .modal-events-list { margin-bottom: 20px; }

    .modal-event-dot-btn {
      width: 16px; height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      padding: 0;
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
    }
    .modal-event-dot-btn:hover {
      transform: scale(1.25);
      box-shadow: 0 0 0 3px var(--border);
    }

    .inline-color-picker {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      position: absolute;
      left: 12px;
      top: calc(100% + 4px);
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .modal-event-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      position: relative;
    }

    .icp-swatch {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s;
      position: relative;
      flex-shrink: 0;
    }
    .icp-swatch:hover { transform: scale(1.2); }
    .icp-swatch.active { box-shadow: 0 0 0 2px white, 0 0 0 4px var(--border2); }

    .modal-event-info { flex: 1; }
    .modal-event-name { font-size: 12px; font-weight: 500; }
    .modal-event-loc  { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .modal-event-del {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 2px 4px;
      border-radius: 3px; transition: color 0.12s;
    }
    .modal-event-del:hover { color: #e07070; }

    .modal-event-move {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 13px; padding: 2px 4px;
      border-radius: 3px; transition: color 0.12s;
      line-height: 1;
    }
    .modal-event-move:hover { color: var(--gold); }
    .modal-event-move.active { color: var(--gold); }

    .event-order-btns {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0;
    }

    .order-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 9px;
      padding: 1px 3px;
      line-height: 1;
      border-radius: 2px;
      transition: color 0.12s;
    }
    .order-btn:hover { color: var(--text); }
    .order-btn:disabled { opacity: 0.2; cursor: default; }

    .event-edit-fields {
      display: none;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }
    .event-edit-fields.open { display: flex; }

    .event-edit-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 8px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .event-edit-input:focus { border-color: var(--gold); }

    .event-edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .edit-save-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 3px 10px;
      background: var(--text);
      color: var(--surface);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: opacity 0.12s;
    }
    .edit-save-btn:hover { opacity: 0.75; }

    .edit-cancel-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 3px 10px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.06em;
    }


    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .form-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }

    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--muted); }

    .color-row {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }

    .color-swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
      overflow: hidden;
    }

    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.active { border-color: white; transform: scale(1.15); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 9px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--gold);
      color: #0c0c0f;
      font-weight: 500;
    }
    .btn-primary:hover { background: var(--gold2); }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 4px;
    }
    .modal-close:hover { color: var(--text); }

    /* ─── EMPTY STATE ─── */
    .add-section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ─── MOBILE ─── */
    @media (max-width: 600px) {
      body { padding: 0 0 40px; }

      .app-header {
        flex-wrap: wrap;
        gap: 10px;
        padding: 14px 10px 12px;
      }

      .month-nav { order: 1; width: 100%; justify-content: center; position: static; transform: none; }

      .month-label { font-size: 20px; min-width: 0; }

      .header-right { order: 2; width: 100%; justify-content: center; gap: 6px; }

      .today-btn, .icon-btn {
        font-size: 9px;
        padding: 5px 10px;
      }

      .icon-btn svg { display: none; }

      .cal-wrap { padding: 0 4px; }

      .day-headers { gap: 1px; margin-top: 10px; grid-template-columns: 22px repeat(7, 1fr); }

      .week-num-header, .week-num-cell { font-size: 7px; }
      .week-num-cell { padding-top: 5px; }

      .day-header {
        font-size: 7px;
        letter-spacing: 0.08em;
        padding: 5px 0;
      }

      .cal-grid { gap: 1px; grid-template-columns: 22px repeat(7, 1fr); }

      .day-cell {
        min-height: 52px;
        padding: 4px 3px;
      }

      .day-num {
        font-size: 10px;
        margin-bottom: 3px;
      }

      /* On mobile: hide text pills, show compact dots */
      .event-pill {
        font-size: 0;          /* hide text */
        padding: 0;
        border-radius: 50%;
        width: 8px;
        height: 8px;
        display: inline-block;
        margin: 1px;
        border-width: 1px;
        flex-shrink: 0;
      }

      .day-events {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 2px;
      }

      .overflow-pill { font-size: 7px; padding: 1px 3px; }

      /* Modal: full screen on mobile */
      .modal {
        width: 100%;
        max-width: 100%;
        min-height: 60vh;
        max-height: 92vh;
        overflow-y: auto;
        border-radius: 16px 16px 0 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 24px 20px 32px;
        transform: translateY(30px);
      }

      .modal-overlay { align-items: flex-end; }
      .modal-overlay.open .modal { transform: translateY(0); }

      .add-hint { display: none; }
    }
  </style>
</head>
<body>

<header class="app-header">

  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="header-right">
    <button class="today-btn" id="todayBtn">today</button>
    <button class="icon-btn" id="exportBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M8 2v8M5 7l3 3 3-3M3 12h10"/>
      </svg>
      export
    </button>
    <button class="icon-btn" id="importBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M8 11V3M5 6l3-3 3 3M3 12h10"/>
      </svg>
      import
    </button>
    <button class="icon-btn icon-btn-danger" id="clearBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9"/>
      </svg>
      clear
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</header>

<!-- CONFIRM CLEAR MODAL -->
<div class="modal-overlay" id="clearOverlay">
  <div class="modal" style="max-width:340px; text-align:center;">
    <div class="modal-date" style="font-size:18px; margin-bottom:8px;">Clear all data?</div>
    <div class="modal-subtitle" style="margin-bottom:24px; font-size:11px; line-height:1.6;">This will permanently delete all events from this device. Export a backup first if needed.</div>
    <div class="modal-actions" style="justify-content:center; gap:12px;">
      <button class="btn btn-ghost" id="clearCancelBtn">Cancel</button>
      <button class="btn" id="clearConfirmBtn" style="background:#c0392b; color:#fff; font-weight:500;">Delete everything</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="cal-wrap">
  <div class="day-headers">
    <div class="week-num-header">W</div>
    <div class="day-header">Mon</div>
    <div class="day-header">Tue</div>
    <div class="day-header">Wed</div>
    <div class="day-header">Thu</div>
    <div class="day-header">Fri</div>
    <div class="day-header weekend">Sat</div>
    <div class="day-header weekend">Sun</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>



<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="modal-events-list" id="modalEventsList"></div>
    <hr class="divider">
    <div class="add-section-label">+ Add event</div>
    <label class="form-label" for="inpName">Event name</label>
    <input class="form-input" id="inpName" type="text">
    <label class="form-label" for="inpLoc">Location</label>
    <input class="form-input" id="inpLoc" type="text">
    <label class="form-label">Colour tag</label>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save event</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const ATTENDING_COLOR = '#1a7a4a'; // special "I'm going" green (★)
const MAYBE_COLOR     = '__maybe__'; // same green border, white bg (?)
const COLORS    = [null,
  '#8a6820', // gold
  '#c0392b', // red
  '#1a7a4a', // ★ attending green
  '__maybe__', // ? intending green (border only)
  '#1a3a8a', // deep blue
  '#7d3c98', // purple
  '#d35400', // burnt orange
  '#7cb518',  // lime green
  '#148080', // teal
  '#e74c6b', // hot pink
  '#2c5aa0', // cornflower blue
  '#6d4c41', // warm brown
  '#b7950b', // dark yellow
  '#1abc9c', // mint
  '#8e44ad', // violet
  '#e67e22', // orange
  '#2980b9', // sky blue
  '#922b21', // dark red
  '#1d8348', // forest green
];

const COLOR_BG  = ['transparent',
  'rgba(138,104,32,0.12)', 'rgba(192,57,43,0.12)', 'rgba(26,122,74,0.22)',
  'transparent',
  'rgba(26,58,138,0.12)',  'rgba(125,60,152,0.12)', 'rgba(211,84,0,0.12)',
  'rgba(124,181,24,0.12)', 'rgba(20,128,128,0.12)', 'rgba(231,76,107,0.12)',
  'rgba(44,90,160,0.12)',  'rgba(109,76,65,0.12)',  'rgba(183,149,11,0.12)',
  'rgba(26,188,156,0.12)', 'rgba(142,68,173,0.12)', 'rgba(230,126,34,0.12)',
  'rgba(41,128,185,0.12)', 'rgba(146,43,33,0.12)',  'rgba(29,131,72,0.12)'];
const DAYS_EN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

let viewYear, viewMonth; // 0-indexed month
let events = {}; // { "YYYY-MM-DD": [{id, name, location, color}] }
let selectedDate = null;
let selectedColor = 0;

const today = new Date();
today.setHours(0,0,0,0);

// ─── Storage helpers ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'event_calendar_data_v1';

function loadEvents() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) events = JSON.parse(raw);
  } catch(e) {
    events = {};
  }
}

function saveEvents() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  } catch(e) {
    showToast('⚠ Could not save – storage full?', true);
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportEvents() {
  const data = JSON.stringify(events, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `event-calendar-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exported successfully');
}

// ─── Import ───────────────────────────────────────────────────────────────────
function importEvents(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      // Validate basic shape
      if (typeof imported !== 'object' || Array.isArray(imported))
        throw new Error('Invalid format');
      // Merge: imported events are added on top of existing ones
      Object.entries(imported).forEach(([key, evs]) => {
        if (!events[key]) events[key] = [];
        evs.forEach(ev => {
          // Avoid duplicates by id
          if (!events[key].find(x => x.id === ev.id)) {
            events[key].push(ev);
          }
        });
      });
      saveEvents();
      render();
      showToast('✓ Imported successfully');
    } catch(err) {
      showToast('⚠ Import failed – invalid file', true);
    }
  };
  reader.readAsText(file);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,10); }

function fmtKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getEventsFor(key) { return events[key] || []; }

// ─── Czech public holidays ────────────────────────────────────────────────────
function getEasterDates(year) {
  // Anonymous Gregorian algorithm
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31);
  const day   = ((h + l - 7*m + 114) % 31) + 1;
  const easter = new Date(year, month - 1, day);
  const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return {
    goodFriday:   fmt(new Date(year, easter.getMonth(), easter.getDate() - 2)),
    easterMonday: fmt(new Date(year, easter.getMonth(), easter.getDate() + 1)),
  };
}

function isCzechHoliday(year, month, day) {
  const m = String(month + 1).padStart(2, '0');
  const d = String(day).padStart(2, '0');
  const md = `${m}-${d}`;
  const fixed = ['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'];
  if (fixed.includes(md)) return true;
  const { goodFriday, easterMonday } = getEasterDates(year);
  if (md === goodFriday && year >= 2016) return true;
  if (md === easterMonday) return true;
  return false;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderMonthLabel();
  renderGrid();
}

function renderMonthLabel() {
  document.getElementById('monthLabel').innerHTML =
    `${MONTH_NAMES[viewMonth]} <span>${viewYear}</span>`;
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function renderGrid() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // First day of month (0=Sun, but we want Mon-based)
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const startOffset = (firstDay === 0) ? 6 : firstDay - 1; // Mon=0
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let day, month, year, otherMonth = false;

    if (i < startOffset) {
      day = daysInPrev - startOffset + i + 1;
      month = viewMonth === 0 ? 11 : viewMonth - 1;
      year  = viewMonth === 0 ? viewYear - 1 : viewYear;
      otherMonth = true;
    } else if (i >= startOffset + daysInMonth) {
      day = i - startOffset - daysInMonth + 1;
      month = viewMonth === 11 ? 0 : viewMonth + 1;
      year  = viewMonth === 11 ? viewYear + 1 : viewYear;
      otherMonth = true;
    } else {
      day = i - startOffset + 1;
      month = viewMonth;
      year  = viewYear;
    }

    // Insert week number cell at start of each row
    if (i % 7 === 0) {
      const weekCell = document.createElement('div');
      weekCell.className = 'week-num-cell';
      // Determine the Monday of this row
      let rowDay, rowMonth, rowYear;
      if (i < startOffset) {
        rowDay   = daysInPrev - startOffset + i + 1;
        rowMonth = viewMonth === 0 ? 11 : viewMonth - 1;
        rowYear  = viewMonth === 0 ? viewYear - 1 : viewYear;
      } else if (i >= startOffset + daysInMonth) {
        rowDay   = i - startOffset - daysInMonth + 1;
        rowMonth = viewMonth === 11 ? 0 : viewMonth + 1;
        rowYear  = viewMonth === 11 ? viewYear + 1 : viewYear;
      } else {
        rowDay   = i - startOffset + 1;
        rowMonth = viewMonth;
        rowYear  = viewYear;
      }
      weekCell.textContent = getISOWeek(new Date(rowYear, rowMonth, rowDay));
      grid.appendChild(weekCell);
    }

    const key = fmtKey(year, month, day);
    const isToday = (new Date(year, month, day).getTime() === today.getTime());
    const dayEvents = getEventsFor(key);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
    cell.dataset.key = key;

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num' + (isCzechHoliday(year, month, day) ? ' holiday' : '');
    numDiv.textContent = day;
    cell.appendChild(numDiv);

    const evList = document.createElement('div');
    evList.className = 'day-events';

    const maxShow = Infinity;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const pill = document.createElement('div');
      pill.className = 'event-pill';
      const isMaybe    = ev.color === MAYBE_COLOR;
      const isAttending = ev.color === ATTENDING_COLOR;
      const borderColor = (isMaybe || isAttending) ? ATTENDING_COLOR : (ev.color || 'var(--border2)');
      pill.style.background = isMaybe ? '#ffffff' : colorBg(ev.color);
      pill.style.color = isMaybe ? ATTENDING_COLOR : (ev.color || 'var(--text)');
      pill.style.border = (isAttending || isMaybe) ? `2px solid ${ATTENDING_COLOR}` : (ev.color ? `1px solid ${ev.color}` : `1px solid var(--border2)`);
      pill.style.fontWeight = isAttending ? '700' : '400';
      pill.textContent = ev.name + (ev.location ? ' · ' + ev.location : '');
      pill.title = ev.name + '\n' + ev.location;
      pill.onclick = (e) => { e.stopPropagation(); openModal(key); };
      evList.appendChild(pill);
    });

    if (dayEvents.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'overflow-pill';
      more.textContent = `+${dayEvents.length - maxShow} more`;
      evList.appendChild(more);
    }

    cell.appendChild(evList);

    const hint = document.createElement('div');
    hint.className = 'add-hint';
    hint.textContent = '+';
    cell.appendChild(hint);

    cell.addEventListener('click', () => openModal(key));
    grid.appendChild(cell);
  }
}

function colorBg(hex) {
  if (!hex || hex === MAYBE_COLOR) return 'transparent';
  const idx = COLORS.indexOf(hex);
  return idx >= 0 ? COLOR_BG[idx] : hex + '22';
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(key) {
  selectedDate = key;
  const [y, m, d] = key.split('-').map(Number);
  const dateObj = new Date(y, m-1, d);
  const dayName = DAYS_EN[dateObj.getDay() === 0 ? 6 : dateObj.getDay() - 1];

  document.getElementById('modalDate').innerHTML =
    `${d} <span>${MONTH_NAMES[m-1]}</span> ${y}`;
  document.getElementById('modalSubtitle').textContent = dayName;

  renderModalEvents(key);
  renderColorPicker();

  document.getElementById('inpName').value = '';
  document.getElementById('inpLoc').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inpName').focus(), 200);
}

function renderModalEvents(key) {
  const list = document.getElementById('modalEventsList');
  list.innerHTML = '';
  const evs = getEventsFor(key);
  if (evs.length === 0) return;

  evs.forEach((ev, idx) => {
    // Row
    const row = document.createElement('div');
    row.className = 'modal-event-row';

    // Up / Down buttons
    const orderBtns = document.createElement('div');
    orderBtns.className = 'event-order-btns';

    const upBtn = document.createElement('button');
    upBtn.className = 'order-btn';
    upBtn.title = 'Move up';
    upBtn.innerHTML = '▲';
    upBtn.disabled = idx === 0;
    upBtn.addEventListener('click', e => {
      e.stopPropagation();
      const arr = events[key];
      [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
      saveEvents();
      renderModalEvents(key);
      renderGrid();
    });

    const downBtn = document.createElement('button');
    downBtn.className = 'order-btn';
    downBtn.title = 'Move down';
    downBtn.innerHTML = '▼';
    downBtn.disabled = idx === evs.length - 1;
    downBtn.addEventListener('click', e => {
      e.stopPropagation();
      const arr = events[key];
      [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
      saveEvents();
      renderModalEvents(key);
      renderGrid();
    });

    orderBtns.appendChild(upBtn);
    orderBtns.appendChild(downBtn);

    // Dot button
    const dot = document.createElement('button');
    dot.className = 'modal-event-dot-btn';
    dot.title = 'Change colour';
    dot.style.background = ev.color === MAYBE_COLOR ? '#ffffff' : (ev.color || 'transparent');
    dot.style.border = (ev.color === MAYBE_COLOR || ev.color === ATTENDING_COLOR)
      ? `2px solid ${ATTENDING_COLOR}`
      : `2px solid ${ev.color || 'var(--border2)'}`;

    // Inline picker (hidden)
    const picker = document.createElement('div');
    picker.className = 'inline-color-picker';
    picker.style.display = 'none';
    picker.addEventListener('click', e => e.stopPropagation());

    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'icp-swatch' + (ev.color === c ? ' active' : '');
      const isMaybeSw     = c === MAYBE_COLOR;
      const isAttendingSw = c === ATTENDING_COLOR;
      sw.style.background = isMaybeSw ? '#ffffff' : (c || 'transparent');
      sw.style.border = (isAttendingSw || isMaybeSw) ? `2px solid ${ATTENDING_COLOR}` : `2px solid ${c || 'var(--border2)'}`;
      sw.style.position = 'relative';
      sw.style.overflow = 'hidden';
      if (!c) {
        sw.innerHTML = '<svg viewBox="0 0 10 10" style="position:absolute;inset:0;width:100%;height:100%;"><line x1="1" y1="9" x2="9" y2="1" stroke="var(--border2)" stroke-width="1.5"/></svg>';
      } else if (isAttendingSw) {
        sw.title = '★ Attending';
        sw.innerHTML = '<svg viewBox="0 0 10 10" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"><text x="5" y="8" text-anchor="middle" font-size="7" fill="white">★</text></svg>';
      } else if (isMaybeSw) {
        sw.title = '? Intending (no ticket)';
        sw.innerHTML = `<svg viewBox="0 0 10 10" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"><text x="5" y="8" text-anchor="middle" font-size="8" font-weight="bold" fill="${ATTENDING_COLOR}">?</text></svg>`;
      }
      sw.addEventListener('mousedown', e => {
        // mousedown fires before the document click that would close the picker
        e.preventDefault();
        e.stopPropagation();
        ev.color = c;
        saveEvents();
        renderModalEvents(key);
        renderGrid();
      });
      picker.appendChild(sw);
    });

    dot.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = picker.style.display !== 'none';
      // Close all open pickers in this list
      list.querySelectorAll('.inline-color-picker').forEach(p => p.style.display = 'none');
      picker.style.display = isOpen ? 'none' : 'flex';
    });

    // Info (view mode)
    const info = document.createElement('div');
    info.className = 'modal-event-info';
    info.innerHTML = `<div class="modal-event-name">${ev.name}</div>
                      <div class="modal-event-loc">${ev.location || '—'}</div>`;

    // Edit fields (edit mode, hidden by default)
    const editFields = document.createElement('div');
    editFields.className = 'event-edit-fields';

    const editName = document.createElement('input');
    editName.className = 'event-edit-input';
    editName.type = 'text';
    editName.value = ev.name;
    editName.placeholder = 'Event name';

    const editLoc = document.createElement('input');
    editLoc.className = 'event-edit-input';
    editLoc.type = 'text';
    editLoc.value = ev.location || '';
    editLoc.placeholder = 'Location';

    const editDate = document.createElement('input');
    editDate.className = 'event-edit-input';
    editDate.type = 'date';
    editDate.value = key;

    const editActions = document.createElement('div');
    editActions.className = 'event-edit-actions';

    const editSave = document.createElement('button');
    editSave.className = 'edit-save-btn';
    editSave.textContent = 'Save';

    const editCancel = document.createElement('button');
    editCancel.className = 'edit-cancel-btn';
    editCancel.textContent = 'Cancel';

    editActions.appendChild(editSave);
    editActions.appendChild(editCancel);
    editFields.appendChild(editName);
    editFields.appendChild(editLoc);
    editFields.appendChild(editDate);
    editFields.appendChild(editActions);

    const openEdit = () => {
      info.style.display = 'none';
      editFields.classList.add('open');
      moveBtn.classList.add('active');
      list.querySelectorAll('.inline-color-picker, .inline-date-picker').forEach(p => p.style.display = 'none');
      setTimeout(() => editName.focus(), 50);
    };

    const closeEdit = () => {
      info.style.display = '';
      editFields.classList.remove('open');
      moveBtn.classList.remove('active');
      // Reset to current values
      editName.value = ev.name;
      editLoc.value = ev.location || '';
      editDate.value = key;
    };

    const commitEdit = () => {
      const newName = editName.value.trim();
      if (!newName) { editName.focus(); return; }
      const newLoc  = editLoc.value.trim();
      const newKey  = editDate.value;

      ev.name     = newName;
      ev.location = newLoc;

      if (newKey && newKey !== key) {
        // Move to different date
        events[key] = (events[key] || []).filter(e => e.id !== ev.id);
        if (events[key].length === 0) delete events[key];
        if (!events[newKey]) events[newKey] = [];
        events[newKey].push(ev);
        saveEvents();
        showToast('✓ Event updated');
        const [ny, nm] = newKey.split('-').map(Number);
        if (ny === viewYear && nm === viewMonth + 1) {
          selectedDate = newKey;
          const d2 = new Date(ny, nm - 1, parseInt(newKey.split('-')[2]));
          document.getElementById('modalDate').innerHTML =
            `${parseInt(newKey.split('-')[2])} <span>${MONTH_NAMES[nm-1]}</span> ${ny}`;
          document.getElementById('modalSubtitle').textContent =
            DAYS_EN[d2.getDay() === 0 ? 6 : d2.getDay() - 1];
          renderModalEvents(newKey);
        } else {
          closeModal();
        }
      } else {
        saveEvents();
        showToast('✓ Event updated');
        renderModalEvents(key);
      }
      renderGrid();
    };

    editSave.addEventListener('click', e => { e.stopPropagation(); commitEdit(); });
    editCancel.addEventListener('click', e => { e.stopPropagation(); closeEdit(); });
    editName.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); editLoc.focus(); } if (e.key === 'Escape') closeEdit(); });
    editLoc.addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); commitEdit(); } if (e.key === 'Escape') closeEdit(); });
    editDate.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commitEdit(); } if (e.key === 'Escape') closeEdit(); });

    // Pencil / edit toggle button
    const moveBtn = document.createElement('button');
    moveBtn.className = 'modal-event-move';
    moveBtn.title = 'Edit event';
    moveBtn.innerHTML = '&#9998;';
    moveBtn.addEventListener('click', e => {
      e.stopPropagation();
      editFields.classList.contains('open') ? closeEdit() : openEdit();
    });

    // Delete button
    const del = document.createElement('button');
    del.className = 'modal-event-del';
    del.title = 'Remove';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      events[key] = (events[key] || []).filter(e => e.id !== ev.id);
      if (events[key].length === 0) delete events[key];
      saveEvents();
      showToast('✓ Event removed');
      renderModalEvents(key);
      renderGrid();
    });

    row.appendChild(orderBtns);
    row.appendChild(dot);
    row.appendChild(picker);
    row.appendChild(info);
    row.appendChild(editFields);
    row.appendChild(moveBtn);
    row.appendChild(del);
    list.appendChild(row);
  });

  // Close colour pickers when clicking anywhere in the modal except the pickers themselves
  list.addEventListener('click', () => {
    list.querySelectorAll('.inline-color-picker').forEach(p => p.style.display = 'none');
  });
}

function renderColorPicker() {
  const row = document.getElementById('colorRow');
  row.innerHTML = COLORS.map((c, i) => {
    const isAttending = c === ATTENDING_COLOR;
    const isMaybe     = c === MAYBE_COLOR;
    const bg     = isMaybe ? '#ffffff' : (c || 'transparent');
    const border = (isAttending || isMaybe) ? `2px solid ${ATTENDING_COLOR}` : `2px solid ${c || 'var(--border2)'}`;
    const inner  = !c
      ? '<svg viewBox="0 0 16 16" style="position:absolute;inset:0;width:100%;height:100%;"><line x1="2" y1="14" x2="14" y2="2" stroke="var(--border2)" stroke-width="1.8"/></svg>'
      : isAttending
        ? `<svg viewBox="0 0 16 16" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"><text x="8" y="12" text-anchor="middle" font-size="9" fill="white">★</text></svg>`
        : isMaybe
        ? `<svg viewBox="0 0 16 16" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"><text x="8" y="12" text-anchor="middle" font-size="10" font-weight="bold" fill="${ATTENDING_COLOR}">?</text></svg>`
        : '';
    return `<div class="color-swatch ${i === selectedColor ? 'active' : ''}"
         style="background:${bg}; border:${border}; position:relative; overflow:hidden;"
         data-idx="${i}"
         title="${isAttending ? '★ Attending' : isMaybe ? '? Intending (no ticket)' : ''}">
      ${inner}
    </div>`;
  }).join('');
  row.querySelectorAll('.color-swatch').forEach(sw => {
    sw.onclick = () => {
      selectedColor = +sw.dataset.idx;
      renderColorPicker();
    };
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  selectedDate = null;
}

async function saveEvent() {
  const name = document.getElementById('inpName').value.trim();
  const loc  = document.getElementById('inpLoc').value.trim();
  if (!name) { document.getElementById('inpName').focus(); return; }

  if (!events[selectedDate]) events[selectedDate] = [];
  events[selectedDate].push({ id: uid(), name, location: loc, color: COLORS[selectedColor] });

  saveEvents();
  showToast('✓ Event saved');
  closeModal();
  renderGrid();
}

// ─── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('prevBtn').onclick = () => {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; }
  else viewMonth--;
  render();
};

document.getElementById('nextBtn').onclick = () => {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; }
  else viewMonth++;
  render();
};

document.getElementById('todayBtn').onclick = () => {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  render();
};

document.getElementById('saveBtn').onclick = saveEvent;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('modalClose').onclick = closeModal;

document.getElementById('inpName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inpLoc').focus();
});
document.getElementById('inpLoc').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveEvent();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('clearBtn').onclick = () => {
  document.getElementById('clearOverlay').classList.add('open');
};
document.getElementById('clearCancelBtn').onclick = () => {
  document.getElementById('clearOverlay').classList.remove('open');
};
document.getElementById('clearConfirmBtn').onclick = () => {
  events = {};
  saveEvents();
  document.getElementById('clearOverlay').classList.remove('open');
  render();
  showToast('✓ All data cleared');
};

document.getElementById('importBtn').onclick = () => {
  document.getElementById('importFile').click();
};

document.getElementById('importFile').onchange = e => {
  const file = e.target.files[0];
  if (file) importEvents(file);
  e.target.value = ''; // reset so same file can be re-imported
};

// ─── Init ─────────────────────────────────────────────────────────────────────
viewYear  = today.getFullYear();
viewMonth = today.getMonth();
loadEvents();
render();
</script>
